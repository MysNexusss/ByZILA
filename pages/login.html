<div class="auth-layout">
  <div class="card auth-card">
    <div class="auth-brand">
      <span class="auth-brand-name">Nexora Financial</span>
    </div>

    <h1 class="auth-title">Entrar</h1>
    <p class="auth-subtitle">Acesse sua conta para continuar.</p>

    <form id="login-form" novalidate>
      <div class="stack" style="--stack-gap: var(--space-5);">
        <div class="field">
          <label class="label" for="login-email">E-mail</label>
          <input class="input" type="email" id="login-email" name="email" autocomplete="email" placeholder="voce@exemplo.com" required>
          <span class="hint hint--error" data-error-for="login-email" hidden></span>
        </div>

        <div class="field">
          <label class="label" for="login-password">Senha</label>
          <input class="input" type="password" id="login-password" name="password" autocomplete="current-password" placeholder="••••••••" required>
          <span class="hint hint--error" data-error-for="login-password" hidden></span>
        </div>

        <button class="btn btn--primary btn--lg" type="submit" id="login-submit">Entrar</button>
      </div>
    </form>

    <p class="auth-footer">Não tem uma conta? <a href="#/register">Cadastre-se</a></p>
  </div>
</div>
