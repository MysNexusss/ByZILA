<div class="transactions-page">
  <div class="transactions-header">
    <div>
      <h1 class="dashboard-title">Transações</h1>
      <p class="dashboard-subtitle">Todas as suas receitas e despesas.</p>
    </div>
    <button class="btn btn--primary" type="button" id="add-transaction-btn">+ Nova transação</button>
  </div>

  <div class="card transactions-filters">
    <div class="cluster">
      <div class="field">
        <label class="label" for="filter-month">Mês</label>
        <input class="input" type="month" id="filter-month">
      </div>
      <div class="field">
        <label class="label" for="filter-type">Tipo</label>
        <select class="select" id="filter-type">
          <option value="">Todos</option>
          <option value="income">Receita</option>
          <option value="expense">Despesa</option>
        </select>
      </div>
      <div class="field">
        <label class="label" for="filter-category">Categoria</label>
        <select class="select" id="filter-category">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="field" style="flex: 1; min-width: 200px;">
        <label class="label" for="filter-search">Buscar</label>
        <input class="input" type="text" id="filter-search" placeholder="Descrição...">
      </div>
    </div>
  </div>

  <div class="card" style="padding: 0;">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Valor</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="transactions-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal de criar/editar transação -->
<div class="modal-overlay" id="transaction-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="transaction-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="transaction-modal-title">Nova transação</h2>
      <button class="modal-close" type="button" aria-label="Fechar" data-action="close-modal">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </div>

    <form id="transaction-form" novalidate>
      <input type="hidden" id="transaction-id" name="id">
      <div class="stack" style="--stack-gap: var(--space-5);">
        <div class="field">
          <label class="label">Tipo</label>
          <div class="cluster">
            <label class="radio"><input type="radio" name="type" value="expense" checked> Despesa</label>
            <label class="radio"><input type="radio" name="type" value="income"> Receita</label>
          </div>
        </div>

        <div class="field">
          <label class="label" for="transaction-amount">Valor</label>
          <input class="input" type="number" id="transaction-amount" name="amount" min="0.01" step="0.01" placeholder="0,00" required>
          <span class="hint hint--error" data-error-for="transaction-amount" hidden></span>
        </div>

        <div class="field">
          <label class="label" for="transaction-category">Categoria</label>
          <select class="select" id="transaction-category" name="category_id"></select>
        </div>

        <div class="field">
          <label class="label" for="transaction-description">Descrição</label>
          <input class="input" type="text" id="transaction-description" name="description" placeholder="Ex.: Supermercado">
        </div>

        <div class="field">
          <label class="label" for="transaction-date">Data</label>
          <input class="input" type="date" id="transaction-date" name="date" required>
          <span class="hint hint--error" data-error-for="transaction-date" hidden></span>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn--ghost" type="button" data-action="close-modal">Cancelar</button>
        <button class="btn btn--primary" type="submit" id="transaction-submit">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal de confirmação de exclusão -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title" style="max-width: 400px;">
    <div class="modal-header">
      <h2 class="modal-title" id="delete-modal-title">Excluir transação</h2>
      <button class="modal-close" type="button" aria-label="Fechar" data-action="close-modal">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </div>
    <div class="modal-body">Tem certeza que deseja excluir esta transação? Essa ação não pode ser desfeita.</div>
    <div class="modal-footer">
      <button class="btn btn--ghost" type="button" data-action="close-modal">Cancelar</button>
      <button class="btn btn--danger" type="button" id="confirm-delete-btn">Excluir</button>
    </div>
  </div>
</div>
