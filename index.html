<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nexora Financial</title>
  <meta name="description" content="Nexora Financial — gestão financeira pessoal.">
  <meta name="theme-color" content="#24242A">

  <!-- App Shell — Fase 2. As telas (dashboard, transações, etc.) ainda não
       existem: router.js irá renderizá-las dentro de #route-outlet. -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="components/header/header.css">
  <link rel="stylesheet" href="components/sidebar/sidebar.css">
  <link rel="stylesheet" href="components/bottom-navigation/bottom-navigation.css">
  <link rel="stylesheet" href="components/input/input.css">
  <link rel="stylesheet" href="components/toast/toast.css">
  <link rel="stylesheet" href="components/loader/loader.css">
  <link rel="stylesheet" href="components/empty-state/empty-state.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">

    <!-- ===== HEADER ===== -->
    <header class="header app-header" id="app-header">
      <div class="header-start">
        <button class="header-icon-btn header-menu-btn" type="button" aria-label="Abrir menu" data-action="toggle-sidebar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M3 5h14M3 10h14M3 15h14"/>
          </svg>
        </button>
        <span class="header-brand">Nexora Financial</span>
      </div>
      <div class="header-end">
        <button class="header-icon-btn" type="button" aria-label="Notificações" data-action="toggle-notifications">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2.5c-2.2 0-4 1.8-4 4v2.6c0 .5-.2 1-.5 1.4L4.3 12c-.6.7-.1 1.8.8 1.8h9.8c.9 0 1.4-1.1.8-1.8l-1.2-1.5c-.3-.4-.5-.9-.5-1.4V6.5c0-2.2-1.8-4-4-4Z"/>
            <path d="M8.3 15.5a1.7 1.7 0 0 0 3.4 0"/>
          </svg>
        </button>
        <button class="header-user" type="button" aria-label="Abrir menu do usuário" data-action="toggle-user-menu">
          <span class="avatar avatar--gold">RM</span>
        </button>
      </div>
    </header>

    <!-- ===== SIDEBAR (DESKTOP) ===== -->
    <aside class="sidebar app-sidebar" id="app-sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-name">Nexora Financial</span>
      </div>

      <nav class="nav sidebar-nav">
        <a class="nav-item" href="#/dashboard" data-route="dashboard" aria-current="page">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg></span>
          Dashboard
        </a>
        <a class="nav-item" href="#/transacoes" data-route="transactions">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10l-3-3M16 13H6l3 3"/></svg></span>
          Transações
        </a>
        <a class="nav-item" href="#/estatisticas" data-route="statistics">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 16V9M10 16V4M16 16v-6"/></svg></span>
          Estatísticas
        </a>
        <a class="nav-item" href="#/metas" data-route="goals">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="3.5"/><circle cx="10" cy="10" r="0.6" fill="currentColor" stroke="none"/></svg></span>
          Metas
        </a>
        <a class="nav-item" href="#/dividas" data-route="debts">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="5" width="15" height="10" rx="1.5"/><path d="M2.5 8.5h15"/></svg></span>
          Dívidas
        </a>
        <a class="nav-item" href="#/perfil" data-route="profile">
          <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3 2.7-5 6-5s6 2 6 5"/></svg></span>
          Perfil
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn--ghost btn--sm" type="button" data-action="logout">Sair</button>
      </div>
    </aside>

    <!-- ===== ÁREA PRINCIPAL DE CONTEÚDO ===== -->
    <main class="app-main" id="app-main">
      <div id="route-outlet">
        <div class="route-loading"><span class="loader loader--lg"></span></div>
      </div>
    </main>

    <!-- ===== BOTTOM NAVIGATION (MOBILE) ===== -->
    <nav class="bottom-nav" id="bottom-nav">
      <a class="bottom-nav-item" href="#/dashboard" data-route="dashboard" aria-current="page">
        <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg></span>
        <span class="bottom-nav-label">Início</span>
      </a>
      <a class="bottom-nav-item" href="#/transacoes" data-route="transactions">
        <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10l-3-3M16 13H6l3 3"/></svg></span>
        <span class="bottom-nav-label">Transações</span>
      </a>
      <a class="bottom-nav-item" href="#/estatisticas" data-route="statistics">
        <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 16V9M10 16V4M16 16v-6"/></svg></span>
        <span class="bottom-nav-label">Estatísticas</span>
      </a>
      <a class="bottom-nav-item" href="#/metas" data-route="goals">
        <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="3.5"/></svg></span>
        <span class="bottom-nav-label">Metas</span>
      </a>
      <a class="bottom-nav-item" href="#/perfil" data-route="profile">
        <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3 2.7-5 6-5s6 2 6 5"/></svg></span>
        <span class="bottom-nav-label">Perfil</span>
      </a>
    </nav>

  </div>

  <!-- ===== CONTAINERS GLOBAIS DE OVERLAY (fora do app-shell) ===== -->
  <div id="modal-root"></div>
  <div id="bottom-sheet-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
